apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metrics-server
  namespace: kube-system
spec:
  interval: 30m
  chart:
    spec:
      chart: metrics-server
      version: "3.12.*"
      sourceRef:
        kind: HelmRepository
        name: metrics-server
        namespace: flux-system
      interval: 12h
  values:
    replicas: 1
    args:
      - --cert-dir=/tmp
      - --secure-port=4443
      - --kubelet-preferred-address-types=InternalIP
      - --kubelet-insecure-tls
      - --kubelet-port=10250
      - --metric-resolution=15s
    containerPort: 4443
    hostNetwork:
      enabled: true
    service:
      port: 443
      targetPort: 4443
    livenessProbe:
      httpGet:
        port: 4443
        path: /livez
        scheme: HTTPS
    readinessProbe:
      httpGet:
        path: /readyz
        port: 4443
        scheme: HTTPS
      initialDelaySeconds: 20
