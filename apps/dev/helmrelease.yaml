apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: clients-api-dev
  namespace: clients-dev
spec:
  interval: 1m
  chart:
    spec:
      chart: clients-api
      version: ">=1.0.0"
      sourceRef:
        kind: HelmRepository
        name: clients-api
        namespace: flux-system
      interval: 1m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    springProfile: local
    replicaCount: 1
    image:
      tag: "1.5.3" # {"$imagepolicy": "flux-system:clients-api-dev:tag"}
    ingress:
      host: clients-api-dev.cluster.kcn333.com
    autoscaling:
      enabled: false
    pdb:
      enabled: false
    networkPolicy:
      enabled: false
    serviceMonitor:
      enabled: false
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 512Mi
    livenessProbe:
      httpGet:
        path: /actuator/health/liveness
        port: 8080
      initialDelaySeconds: 120
      periodSeconds: 10
      failureThreshold: 5
    readinessProbe:
      httpGet:
        path: /actuator/health/readiness
        port: 8080
      initialDelaySeconds: 90
      periodSeconds: 10
      failureThreshold: 5
    database:
      host: ""
      port: ""
      name: ""
      credentialsSecret: ""
