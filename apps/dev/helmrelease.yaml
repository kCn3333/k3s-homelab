apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: clients-api-dev
  namespace: clients-dev
spec:
  interval: 1m
  chart:
    spec:
      chart: clients-api
      version: ">=1.0.0"
      sourceRef:
        kind: HelmRepository
        name: clients-api
        namespace: flux-system
      interval: 1m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    springProfile: local
    replicaCount: 1
    image:
      tag: "1.5.3" # {"$imagepolicy": "flux-system:clients-api:tag"}
    ingress:
      host: clients-api-dev.cluster.kcn333.com
    autoscaling:
      enabled: false
    pdb:
      enabled: false
    networkPolicy:
      enabled: false
    serviceMonitor:
      enabled: false
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    database:
      host: ""
      port: ""
      name: ""
      credentialsSecret: ""
