apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metrics-server
  namespace: kube-system
spec:
  interval: 30m
  chart:
    spec:
      chart: metrics-server
      version: "3.12.*"
      sourceRef:
        kind: HelmRepository
        name: metrics-server
        namespace: flux-system
      interval: 12h
  values:
    args:
      - --cert-dir=/tmp
      - --secure-port=4443
      - --kubelet-preferred-address-types=InternalIP
      - --kubelet-insecure-tls
      - --metric-resolution=15s
    hostNetwork:
      enabled: true
    containerPort: 4443
    livenessProbe:
      httpGet:
        port: 4443
    readinessProbe:
      httpGet:
        port: 4443
      failureThreshold: 10
      periodSeconds: 10
