apiVersion: v1
kind: ConfigMap
metadata:
  name: ntfy-webhook
  namespace: monitoring
data:
  app.py: |
    import json, os, urllib.request, base64
    from http.server import HTTPServer, BaseHTTPRequestHandler

    NTFY_URL = os.environ["NTFY_URL"]
    NTFY_USER = os.environ["NTFY_USER"]
    NTFY_PASS = os.environ["NTFY_PASS"]

    PRIORITY_MAP = {"critical": "urgent", "warning": "high", "info": "default"}
    TAGS_MAP = {"critical": "rotating_light", "warning": "warning", "info": "information_source"}

    def send_ntfy(title, message, priority, tags):
        req = urllib.request.Request(NTFY_URL, data=message.encode())

        credentials = base64.b64encode(f"{NTFY_USER}:{NTFY_PASS}".encode()).decode()

        req.add_header("Authorization", f"Basic {credentials}")
        req.add_header("Title", title)
        req.add_header("Priority", priority)
        req.add_header("Tags", tags)

        req.add_header("Content-Type", "text/plain")
        req.add_header("User-Agent", "alertmanager-webhook")

        urllib.request.urlopen(req)

    class Handler(BaseHTTPRequestHandler):
        def do_POST(self):
            data = json.loads(self.rfile.read(int(self.headers["Content-Length"])))
            for alert in data.get("alerts", []):
                severity = alert["labels"].get("severity", "info")
                status = alert.get("status", "firing")
                name = alert["labels"].get("alertname", "Alert")
                summary = alert.get("annotations", {}).get("summary", name)
                description = alert.get("annotations", {}).get("description", "")
                namespace = alert["labels"].get("namespace", "")

                if status == "resolved":
                    title = f"✅ RESOLVED: {name}"
                    priority = "default"
                    tags = "white_check_mark"
                else:
                    title = f"🔥 {severity.upper()}: {name}"
                    priority = PRIORITY_MAP.get(severity, "default")
                    tags = TAGS_MAP.get(severity, "bell")

                message = summary
                if description:
                    message += f"\n\n{description}"
                if namespace:
                    message += f"\n\nNamespace: {namespace}"

                try:
                    send_ntfy(title, message, priority, tags)
                    print(f"Sent: {title}")
                except Exception as e:
                    print(f"Error: {e}")

            self.send_response(200)
            self.end_headers()

        def log_message(self, *args):
            pass

    print("ntfy-webhook starting on :8080")
    HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntfy-webhook
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ntfy-webhook
  template:
    metadata:
      labels:
        app: ntfy-webhook
    spec:
      containers:
        - name: ntfy-webhook
          image: python:3.12-alpine
          command: ["python", "/app/app.py"]
          volumeMounts:
            - name: app
              mountPath: /app
          env:
            - name: NTFY_URL
              valueFrom:
                secretKeyRef:
                  name: alertmanager-ntfy-secret
                  key: url
            - name: NTFY_USER
              valueFrom:
                secretKeyRef:
                  name: alertmanager-ntfy-secret
                  key: username
            - name: NTFY_PASS
              valueFrom:
                secretKeyRef:
                  name: alertmanager-ntfy-secret
                  key: password
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 64Mi
              cpu: 50m
      volumes:
        - name: app
          configMap:
            name: ntfy-webhook
---
apiVersion: v1
kind: Service
metadata:
  name: ntfy-webhook
  namespace: monitoring
spec:
  selector:
    app: ntfy-webhook
  ports:
    - port: 8080
      targetPort: 8080
