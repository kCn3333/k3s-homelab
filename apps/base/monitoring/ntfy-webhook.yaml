apiVersion: v1
kind: ConfigMap
metadata:
  name: ntfy-webhook
  namespace: monitoring
data:
  app.py: |
    import json, os, urllib.request, base64
    from http.server import HTTPServer, BaseHTTPRequestHandler

    NTFY_URL = os.environ["NTFY_URL"]
    NTFY_USER = os.environ["NTFY_USER"]
    NTFY_PASS = os.environ["NTFY_PASS"]

    PRIORITY_MAP = {"critical": "urgent", "warning": "high", "info": "default"}
    TAGS_MAP = {"critical": "rotating_light", "warning": "warning", "info": "information_source"}

    def send_ntfy(title, message, priority, tags):
        credentials = base64.b64encode(f"{NTFY_USER}:{NTFY_PASS}".encode()).decode()

        req = urllib.request.Request(
            NTFY_URL,
            data=message.encode(),
            method="POST"
        )

        req.add_header("Authorization", f"Basic {credentials}")
        req.add_header("Title", title)
        req.add_header("Priority", priority)
        req.add_header("Tags", tags)
        req.add_header("Content-Type", "text/plain")
        req.add_header("User-Agent", "Mozilla/5.0")

        urllib.request.urlopen(req, timeout=5)


    class Handler(BaseHTTPRequestHandler):

        def do_POST(self):
            try:
                length = int(self.headers.get("Content-Length", 0))
                raw = self.rfile.read(length)

                data = json.loads(raw)

                alerts = data.get("alerts", [])
                print(f"Received {len(alerts)} alerts", flush=True)

                for alert in alerts:
                    severity = alert.get("labels", {}).get("severity", "info")
                    status = alert.get("status", "firing")
                    name = alert.get("labels", {}).get("alertname", "Alert")

                    summary = alert.get("annotations", {}).get("summary", name)
                    description = alert.get("annotations", {}).get("description", "")
                    namespace = alert.get("labels", {}).get("namespace", "")

                    if status == "resolved":
                        title = f"RESOLVED: {name}"
                        priority = "default"
                        tags = "white_check_mark"
                    else:
                        title = f"{severity.upper()}: {name}"
                        priority = PRIORITY_MAP.get(severity, "default")
                        tags = TAGS_MAP.get(severity, "bell")

                    message = summary

                    if description:
                        message += f"\n\n{description}"

                    if namespace:
                        message += f"\n\nNamespace: {namespace}"

                    try:
                        send_ntfy(title, message, priority, tags)
                        print(f"Sent: {title}", flush=True)
                    except Exception as e:
                        print(f"ntfy error: {e}", flush=True)

            except Exception as e:
                print(f"Webhook error: {e}", flush=True)

            self.send_response(200)
            self.end_headers()

        def log_message(self, format, *args):
            # wycisza spam http.server
            return


    print("ntfy-webhook starting on :8080", flush=True)

    HTTPServer.allow_reuse_address = True
    HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()



---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntfy-webhook
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ntfy-webhook
  template:
    metadata:
      labels:
        app: ntfy-webhook
    spec:
      containers:
        - name: ntfy-webhook
          image: python:3.12-alpine
          command: ["python", "-u", "/app/app.py"]
          volumeMounts:
            - name: app
              mountPath: /app
          env:
            - name: NTFY_URL
              valueFrom:
                secretKeyRef:
                  name: alertmanager-ntfy-secret
                  key: url
            - name: NTFY_USER
              valueFrom:
                secretKeyRef:
                  name: alertmanager-ntfy-secret
                  key: username
            - name: NTFY_PASS
              valueFrom:
                secretKeyRef:
                  name: alertmanager-ntfy-secret
                  key: password
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 64Mi
              cpu: 50m
      volumes:
        - name: app
          configMap:
            name: ntfy-webhook
---
apiVersion: v1
kind: Service
metadata:
  name: ntfy-webhook
  namespace: monitoring
spec:
  selector:
    app: ntfy-webhook
  ports:
    - port: 8080
      targetPort: 8080
