apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-test
  namespace: flux-test
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.29.5 # {"$imagepolicy": "flux-system:nginx"}
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  namespace: flux-test
spec:
  type: NodePort
  selector:
    app: nginx
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    traefik.ingress.kubernetes.io/ssl-redirect: "true"
  name: minimal-ingress
  namespace: flux-test
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - nginx-test.cluster.kcn333.com
      secretName: local-prod-kcn333-tls
  rules:
    - host: nginx-test.cluster.kcn333.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx-service
                port:
                  number: 80
