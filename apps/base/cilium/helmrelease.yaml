apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
  annotations:
    meta.helm.sh/release-name: cilium
    meta.helm.sh/release-namespace: kube-system
spec:
  interval: 30m
  chart:
    spec:
      chart: cilium
      version: "1.19.1"
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
      interval: 12h

  install:
    createNamespace: false

  upgrade:
    remediation:
      retries: 3

  values:
    k8sServiceHost: 192.168.55.10
    k8sServicePort: 6443
    operator:
      replicas: 1
    kubeProxyReplacement: true
    nodePort:
      enabled: true
    hostServices:
      enabled: true
    externalIPs:
      enabled: true
    bpf:
      hostLegacyRouting: true
